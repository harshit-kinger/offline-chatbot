<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>Offline Chatbot</h1>
        <p class="sub">Frontend ↔ Backend ↔ API</p>
      </div>
      <div class="header-actions">
        <button id="btnClear" class="btn ghost" title="Clear chat">Clear</button>
      </div>
    </header>

    <main class="chat" id="chat"></main>

    <footer class="composer">
      <textarea id="input" placeholder="Type your message... (Enter to send, Shift+Enter new line)"></textarea>
      <button id="btnSend" class="btn primary">Send</button>
    </footer>

    <div class="toast" id="toast"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
